<!DOCTYPE html>
<html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>

/* 🌐 SITE GERAL */
body {
  font-family: Arial;
  background: #3b0a0a; /* vinho escuro */
  color: white;
  text-align: center;
  margin: 0;
  padding: 0;
}

/* 🟡 BANNER */
.banner {
  background: linear-gradient(90deg, #c0c0c0, #f2f2f2);
  padding: 25px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* ✍️ NOME LOJA */
.nome-loja {
  font-family: 'Dancing Script', cursive;
  font-size: 80px;
  font-weight: 700;
  color: black;
}

/* 🖼️ LOGO */
.logo {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  vertical-align: middle;
  margin-right: 10px;
}

/* 🛍️ PRODUTOS */
.produtos {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.produto {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 10px;
  width: 220px;
  transition: 0.3s;
}

.produto:hover {
  transform: scale(1.05);
}

/* 📱 BOTÃO WHATSAPP */
.botao {
  display: inline-block;
  background: linear-gradient(45deg, #25D366, #128C7E);
  color: white;
  padding: 14px 25px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  text-decoration: none;
  transition: 0.3s;
  margin-top: 20px;
}

.botao:hover {
  transform: scale(1.05);
}

/* 🖼️ IMAGENS */
img {
  border-radius: 10px;
  margin-top: 10px;
}

</style>

</head>

<body>

<!-- 🟡 BANNER -->
<div class="banner">
  <img src="logo.png" class="logo">
  <span class="nome-loja">SEstore079</span>
</div>

<h2>Moda Fitness Feminina em Atacado</h2>

<!-- 🛍️ PRODUTOS -->
<div class="produtos">

  <div class="produto">
    <img src="photo2.jpeg" width="200">
    <h3>Macaquinho 39,99$</h3>
    <p>(a partir de 10 peças)</p>
  </div>

  <div class="produto">
    <img src="foto.png" width="200">
    <h3>Top Fitness R$ 12,99</h3>
    <p>(a partir de 12 peças)</p>
  </div>

 
</div>

<p>Novidades toda semana 🛍️</p>

<!-- 📱 BOTÃO WHATSAPP -->
<a href="https://wa.me/5579981253192" target="_blank" class="botao">
  Comprar no WhatsApp
</a>

</body>

</html>
